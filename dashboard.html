<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ZLT Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#0f1117;
  color:white;
}

/* Red Glow */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background:
    radial-gradient(circle at 20% 30%, #ff1e56 0%, transparent 40%),
    radial-gradient(circle at 80% 70%, #e11d48 0%, transparent 40%);
  opacity:0.15;
  z-index:-1;
}

.nav{
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  background:#161b22cc;
  backdrop-filter:blur(10px);
}

.nav a{
  color:#aaa;
  text-decoration:none;
  margin-left:20px;
}

.nav a:hover{
  color:white;
}

.logo{
  font-weight:800;
}

.container{
  max-width:900px;
  margin:auto;
  padding:40px 20px;
}

.card{
  background:#161b22;
  padding:25px;
  border-radius:18px;
  margin-bottom:30px;
  border:1px solid #222;
}

button{
  padding:10px 18px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
  background:linear-gradient(135deg,#ff1e56,#e11d48);
  color:white;
}

button:hover{
  opacity:0.85;
}

.toggle{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-top:15px;
}

.download-btn{
  margin-top:15px;
}
</style>
</head>

<body>

<div class="nav">
  <div class="logo">ZLT Dashboard</div>
  <div>
    <a href="index.html">Home</a>
    <a href="https://discord.gg/qGbqGC2uCs" target="_blank">Discord</a>
    <a href="#" id="logoutBtn">Logout</a>
  </div>
</div>

<div class="container">

<h2 id="welcome">Loading...</h2>

<div class="card">
  <h3>Your Profile</h3>
  <p><strong>Email:</strong> <span id="email"></span></p>
  <p><strong>Member Since:</strong> <span id="joined"></span></p>
</div>

<div class="card">
  <h3>Email Updates</h3>
  <div class="toggle">
    <span>Receive PCInfo update emails</span>
    <input type="checkbox" id="emailToggle">
  </div>
  <button style="margin-top:15px;" id="savePrefs">Save Preferences</button>
  <p id="statusMsg" style="color:#aaa;"></p>
</div>

<div class="card">
  <h3>PCInfo</h3>
  <p>Download the latest version of PCInfo.</p>
  <button class="download-btn" onclick="window.open('https://github.com/ZLT-CO/PCInfo/releases/download/PCInfo/PCInfo-v1.00.zip')">
    Download PCInfo v1.00
  </button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBfeHZtjuYfoWdRL2-gYZ2Wx0oZeFa1RJ0",
  authDomain: "zlt-co.firebaseapp.com",
  projectId: "zlt-co",
  storageBucket: "zlt-co.firebasestorage.app",
  messagingSenderId: "314898532151",
  appId: "1:314898532151:web:c7e17c09b08d984f11bcb2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async (user)=>{
  if(!user){
    window.location.href="login.html";
  } else {
    document.getElementById("welcome").innerText="Welcome, "+user.displayName;
    document.getElementById("email").innerText=user.email;

    const userRef=doc(db,"users",user.uid);
    const snap=await getDoc(userRef);

    if(!snap.exists()){
      await setDoc(userRef,{
        email:user.email,
        subscribed:false,
        joined:serverTimestamp()
      });
      document.getElementById("joined").innerText="Just now";
    } else {
      const data=snap.data();
      document.getElementById("emailToggle").checked=data.subscribed;
      document.getElementById("joined").innerText="Active Member";
    }

    document.getElementById("savePrefs").onclick=async()=>{
      await setDoc(userRef,{
        email:user.email,
        subscribed:document.getElementById("emailToggle").checked,
        joined:serverTimestamp()
      });
      document.getElementById("statusMsg").innerText="Preferences saved.";
    };
  }
});

document.getElementById("logoutBtn").onclick=()=>signOut(auth);

</script>

</body>
</html>
