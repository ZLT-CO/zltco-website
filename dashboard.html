<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ZLT Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#0f1117;
  color:white;
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  background:#161b22;
}

.nav a{
  color:#aaa;
  text-decoration:none;
  margin-left:20px;
}

.nav a:hover{
  color:white;
}

.logo{
  font-weight:800;
}

/* MAIN */
.container{
  padding:40px;
  max-width:1000px;
  margin:auto;
}

.card{
  background:#161b22;
  padding:25px;
  border-radius:16px;
  margin-bottom:30px;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#e11d48;
  color:white;
  font-weight:600;
}

button:hover{
  opacity:0.85;
}

input, textarea{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
  margin-top:10px;
  margin-bottom:10px;
}

.thread{
  background:#222;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="nav">
  <div class="logo">ZLT Dashboard</div>
  <div>
    <a href="index.html">Home</a>
    <a href="pcinfo.html">PCInfo</a>
    <a href="forum.html">Forum</a>
    <a href="https://discord.gg/qGbqGC2uCs" target="_blank">Discord</a>
    <a href="#" id="logoutBtn">Logout</a>
  </div>
</div>

<div class="container">

  <h2 id="welcome">Loading...</h2>

  <div class="card">
    <h3>PCInfo Download</h3>
    <p id="downloadCount">Loading downloads...</p>
    <button id="downloadBtn">Download PCInfo</button>
  </div>

  <div class="card">
    <h3>Create Thread</h3>
    <input id="threadTitle" placeholder="Thread title...">
    <textarea id="threadContent" placeholder="Write something..."></textarea>
    <button id="createThreadBtn">Post Thread</button>
  </div>

  <div class="card">
    <h3>Forum Threads</h3>
    <div id="threads"></div>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, increment, addDoc, collection, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBfeHZtjuYfoWdRL2-gYZ2Wx0oZeFa1RJ0",
  authDomain: "zlt-co.firebaseapp.com",
  projectId: "zlt-co",
  storageBucket: "zlt-co.firebasestorage.app",
  messagingSenderId: "314898532151",
  appId: "1:314898532151:web:c7e17c09b08d984f11bcb2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async (user) => {
  if(!user){
    window.location.href = "login.html";
  } else {
    document.getElementById("welcome").innerText = "Welcome, " + user.displayName;
    loadDownloads();
    loadThreads();
  }
});

document.getElementById("logoutBtn").onclick = () => signOut(auth);

/* DOWNLOAD SYSTEM */

async function loadDownloads(){
  const ref = doc(db,"stats","pcinfo");
  const snap = await getDoc(ref);

  if(!snap.exists()){
    await setDoc(ref,{downloads:0});
    document.getElementById("downloadCount").innerText = "0 downloads";
  } else {
    document.getElementById("downloadCount").innerText =
      snap.data().downloads + " downloads";
  }
}

document.getElementById("downloadBtn").onclick = async () => {
  const ref = doc(db,"stats","pcinfo");
  await updateDoc(ref,{downloads: increment(1)});
  window.open("YOUR_ZIP_LINK_HERE");
};

/* FORUM */

document.getElementById("createThreadBtn").onclick = async () => {
  const title = document.getElementById("threadTitle").value.trim();
  const content = document.getElementById("threadContent").value.trim();
  const user = auth.currentUser;

  if(title.length < 3){
    alert("Title must be at least 3 characters.");
    return;
  }

  if(content.length < 1 || content.length > 500){
    alert("Message must be 1-500 characters.");
    return;
  }

  await addDoc(collection(db,"threads"),{
    title:title,
    content:content,
    author:user.displayName,
    createdAt:serverTimestamp()
  });

  document.getElementById("threadTitle").value="";
  document.getElementById("threadContent").value="";
  loadThreads();
};

async function loadThreads(){
  const snapshot = await getDocs(collection(db,"threads"));
  const container = document.getElementById("threads");
  container.innerHTML="";

  snapshot.forEach(docSnap=>{
    const data = docSnap.data();
    container.innerHTML += `
      <div class="thread">
        <strong>${data.title}</strong><br>
        <small>by ${data.author}</small>
        <p>${data.content}</p>
      </div>
    `;
  });
}

</script>

</body>
</html>
