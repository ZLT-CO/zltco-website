<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ZLT Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#0f1117;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:#161b22;
  padding:50px;
  border-radius:20px;
  width:350px;
  text-align:center;
  box-shadow:0 0 40px rgba(255,0,0,0.15);
}

h2{
  margin-bottom:10px;
}

p{
  color:#aaa;
  font-size:14px;
  margin-bottom:30px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  background:#ea4335;
  color:white;
  transition:0.3s;
}

button:hover{
  background:#c33224;
}
</style>
</head>

<body>
 

<div class="card">
  <h2>Welcome to ZLT</h2>
  <p>Sign in with Google to access updates, downloads, and the community.</p>
  <button id="loginBtn">Sign in with Google</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBfeHZtjuYfoWdRL2-gYZ2Wx0oZeFa1RJ0",
  authDomain: "zlt-co.firebaseapp.com",
  projectId: "zlt-co",
  storageBucket: "zlt-co.firebasestorage.app",
  messagingSenderId: "314898532151",
  appId: "1:314898532151:web:c7e17c09b08d984f11bcb2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

document.getElementById("loginBtn").onclick = async () => {
  const result = await signInWithPopup(auth, provider);
  window.location.href = "dashboard.html";
};

</script>

</body>
</html>
</html>
